openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Etscript API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: manuscripts
    description: Manuscript management
  - name: jobs
    description: Formatting jobs
  - name: dashboard
    description: Dashboard and summary data
  - name: payments
    description: Payment checkout and verification
  - name: subscription
    description: Subscription status and management
  - name: storage
    description: Object storage upload and serving endpoints
  - name: storage-limits
    description: Plan-based storage and manuscript limits
  - name: account
    description: Account and data management
  - name: user-templates
    description: Saved user formatting templates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /manuscripts:
    get:
      operationId: listManuscripts
      tags: [manuscripts]
      summary: List user manuscripts
      responses:
        "200":
          description: List of manuscripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Manuscript"
    post:
      operationId: createManuscript
      tags: [manuscripts]
      summary: Create a new manuscript record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManuscriptInput"
      responses:
        "201":
          description: Created manuscript
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manuscript"

  /manuscripts/{id}:
    get:
      operationId: getManuscript
      tags: [manuscripts]
      summary: Get a manuscript by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Manuscript
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manuscript"
        "404":
          description: Not found
    delete:
      operationId: deleteManuscript
      tags: [manuscripts]
      summary: Delete a manuscript
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /manuscripts/{id}/upload-url:
    post:
      operationId: getUploadUrl
      tags: [manuscripts]
      summary: Get a presigned upload URL for a manuscript file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Upload URL response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all formatting jobs for user
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormattingJob"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a formatting job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormattingJobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormattingJob"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a formatting job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Formatting job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormattingJob"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a formatting job configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormattingJobUpdate"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormattingJob"

  /jobs/{id}/process:
    post:
      operationId: processJob
      tags: [jobs]
      summary: Trigger formatting processing for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormattingJob"

  /jobs/{id}/readiness:
    get:
      operationId: getJobReadiness
      tags: [jobs]
      summary: Get book readiness checklist for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Readiness checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessReport"

  /jobs/{id}/content:
    get:
      operationId: getJobEditorContent
      tags: [jobs]
      summary: Get clean editor HTML content for a formatting job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Editor content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobEditorContent"
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent manuscript activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /payments/checkout:
    post:
      operationId: createCheckout
      tags: [payments]
      summary: Initialize a payment and get a checkout URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCheckoutInput"
      responses:
        "200":
          description: Checkout initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentCheckout"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized

  /payments/verify:
    get:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify a payment by reference after checkout
      parameters:
        - name: reference
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerification"
        "404":
          description: Transaction not found

  /payments/export-access/{jobId}:
    get:
      operationId: getExportAccess
      tags: [payments]
      summary: Whether the user can download clean (non-watermarked) exports for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Export access status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportAccess"

  /subscription:
    get:
      operationId: getSubscription
      tags: [subscription]
      summary: Get the current user's subscription status
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"

  /account:
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Delete the authenticated user's account and all associated data
      responses:
        "204":
          description: Account and all data deleted successfully
        "500":
          description: Failed to delete account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/limits:
    get:
      operationId: getStorageLimits
      tags: [storage-limits]
      summary: Get current user's storage usage and plan limits
      responses:
        "200":
          description: Storage limits and current usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageLimits"

  /user-templates:
    get:
      operationId: listUserTemplates
      tags: [user-templates]
      summary: List saved formatting templates for the current user
      responses:
        "200":
          description: List of user templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTemplate"
    post:
      operationId: createUserTemplate
      tags: [user-templates]
      summary: Save a new formatting template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTemplateCreate"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTemplate"

  /user-templates/{id}:
    patch:
      operationId: updateUserTemplate
      tags: [user-templates]
      summary: Update a saved template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTemplateUpdate"
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTemplate"
        "404":
          description: Not found
    delete:
      operationId: deleteUserTemplate
      tags: [user-templates]
      summary: Delete a saved template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /subscription/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscription]
      summary: Cancel the current user's premium subscription
      responses:
        "200":
          description: Updated subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatus"
        "404":
          description: No active subscription

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/public-objects/{filePath}:
    get:
      tags: [storage]
      operationId: getPublicObject
      summary: Serve a public asset from object storage
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded object from private storage
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Manuscript:
      type: object
      required: [id, userId, title, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        originalFilename:
          type: ["string", "null"]
        fileKey:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        wordCount:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, uploaded, processing, ready, error]
        createdAt:
          type: string
        updatedAt:
          type: string

    ManuscriptInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        originalFilename:
          type: string

    UploadUrlRequest:
      type: object
      required: [filename, contentType]
      properties:
        filename:
          type: string
        contentType:
          type: string
        fileSize:
          type: integer
          minimum: 1

    UploadUrlResponse:
      type: object
      required: [uploadUrl, fileKey]
      properties:
        uploadUrl:
          type: string
        fileKey:
          type: string

    FormattingJob:
      type: object
      required: [id, manuscriptId, status, createdAt]
      properties:
        id:
          type: integer
        manuscriptId:
          type: integer
        bookType:
          type: ["string", "null"]
        publishingTarget:
          type: ["string", "null"]
          enum: [amazon_kdp_paperback, amazon_kdp_hardcover, a4_print, ebook, corporate_manual, null]
        theme:
          type: ["string", "null"]
          enum: [classic, modern, premium, corporate, academic, null]
        fontFamily:
          type: ["string", "null"]
        fontSize:
          type: ["integer", "null"]
        lineSpacing:
          type: ["string", "null"]
        marginSize:
          type: ["string", "null"]
        pageNumberPosition:
          type: ["string", "null"]
          enum: [top_center, top_left, top_right, bottom_center, bottom_left, bottom_right, null]
        chapterNumberStyle:
          type: ["string", "null"]
          enum: [arabic, roman, words, none, null]
        showBranding:
          type: boolean
          default: true
        citationStyle:
          type: ["string", "null"]
        letterData:
          type: ["string", "null"]
        editedContent:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, processing, completed, error]
        outputPdfKey:
          type: ["string", "null"]
        outputDocxKey:
          type: ["string", "null"]
        previewText:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        manuscript:
          $ref: "#/components/schemas/Manuscript"

    FormattingJobInput:
      type: object
      required: [manuscriptId]
      properties:
        manuscriptId:
          type: integer
        bookType:
          type: string
        publishingTarget:
          type: string
        theme:
          type: string

    FormattingJobUpdate:
      type: object
      properties:
        bookType:
          type: string
        publishingTarget:
          type: string
        theme:
          type: string
        fontFamily:
          type: string
        fontSize:
          type: integer
        lineSpacing:
          type: string
        marginSize:
          type: string
        pageNumberPosition:
          type: string
        chapterNumberStyle:
          type: string
        showBranding:
          type: boolean
        citationStyle:
          type: string
        letterData:
          type: string
        editedContent:
          type: string

    JobEditorContent:
      type: object
      required: [html, wordCount]
      properties:
        html:
          type: string
        wordCount:
          type: integer

    ReadinessItem:
      type: object
      required: [label, passed]
      properties:
        label:
          type: string
        passed:
          type: boolean
        severity:
          type: string
          enum: [required, warning]

    ReadinessReport:
      type: object
      required: [score, items]
      properties:
        score:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessItem"

    DashboardSummary:
      type: object
      required: [totalManuscripts, completedExports, inProgress, planName]
      properties:
        totalManuscripts:
          type: integer
        completedExports:
          type: integer
        inProgress:
          type: integer
        planName:
          type: string

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [manuscript_uploaded, job_completed, job_started]
        description:
          type: string
        manuscriptTitle:
          type: ["string", "null"]
        createdAt:
          type: string

    PaymentCheckoutInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [payg_export, premium_subscription]
        jobId:
          type: ["integer", "null"]

    PaymentCheckout:
      type: object
      required: [authorizationUrl, reference]
      properties:
        authorizationUrl:
          type: string
        reference:
          type: string

    PaymentVerification:
      type: object
      required: [status, type]
      properties:
        status:
          type: string
          enum: [success, pending, failed]
        type:
          type: string
          enum: [payg_export, premium_subscription]
        jobId:
          type: ["integer", "null"]

    ExportAccess:
      type: object
      required: [canDownloadClean, plan, jobPaid]
      properties:
        canDownloadClean:
          type: boolean
        plan:
          type: string
          enum: [free, premium]
        jobPaid:
          type: boolean

    SubscriptionStatus:
      type: object
      required: [plan, status]
      properties:
        plan:
          type: string
          enum: [free, premium]
        status:
          type: ["string", "null"]
        currentPeriodEnd:
          type: ["string", "null"]

    StorageUploadRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    StorageUploadResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/StorageUploadRequest"

    StorageLimits:
      type: object
      required: [plan, maxManuscripts, maxStorageBytes, usedManuscripts, usedStorageBytes]
      properties:
        plan:
          type: string
          enum: [free, payg, premium]
        maxManuscripts:
          type: integer
        maxStorageBytes:
          type: integer
        usedManuscripts:
          type: integer
        usedStorageBytes:
          type: integer

    UserTemplate:
      type: object
      required: [id, userId, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        bookType:
          type: ["string", "null"]
        publishingTarget:
          type: ["string", "null"]
        theme:
          type: ["string", "null"]
        fontFamily:
          type: ["string", "null"]
        fontSize:
          type: ["integer", "null"]
        lineSpacing:
          type: ["string", "null"]
        marginSize:
          type: ["string", "null"]
        pageNumberPosition:
          type: ["string", "null"]
        chapterNumberStyle:
          type: ["string", "null"]
        citationStyle:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    UserTemplateCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        bookType:
          type: string
        publishingTarget:
          type: string
        theme:
          type: string
        fontFamily:
          type: string
        fontSize:
          type: integer
        lineSpacing:
          type: string
        marginSize:
          type: string
        pageNumberPosition:
          type: string
        chapterNumberStyle:
          type: string
        citationStyle:
          type: string

    UserTemplateUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        bookType:
          type: string
        publishingTarget:
          type: string
        theme:
          type: string
        fontFamily:
          type: string
        fontSize:
          type: integer
        lineSpacing:
          type: string
        marginSize:
          type: string
        pageNumberPosition:
          type: string
        chapterNumberStyle:
          type: string
        citationStyle:
          type: string

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
