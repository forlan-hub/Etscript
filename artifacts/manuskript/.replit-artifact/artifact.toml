kind = "web"
previewPath = "/"
title = "Manuskript AI"
version = "1.0.0"
id = "artifacts/manuskript"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25934

[services.development]
run = "pnpm --filter @workspace/manuskript run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manuskript", "run", "build" ]
publicDir = "artifacts/manuskript/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25934"
BASE_PATH = "/"
